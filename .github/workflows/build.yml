name: build

# PR 은 가벼운 검증(컴파일 + 단위 테스트)만 자동으로 돈다.
# 무거운 3-OS 데스크톱 패키징 + 안드로이드 AAB 는 수동 실행(Actions 탭) 또는 v* 태그 푸시에서만.
on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*'

jobs:
  # PR 자동 검증 — Linux 러너 1대에서 Android 컴파일 + 데스크톱 단위 테스트만(빠르고 저렴).
  # 패키징(app-image/AAB)은 돌리지 않는다 — 그건 아래 desktop/android 잡이 담당.
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile Android + run desktop tests
        shell: bash
        run: ./gradlew :app:assembleDebug :app:desktopTest --console=plain --stacktrace


  # Windows / macOS / Linux 각각에서 그 OS용 데스크톱 배포본을 만든다(jpackage 는 크로스빌드 불가).
  desktop:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin   # jpackage 포함(JBR 과 달리)
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      # createDistributable = 번들 런타임 포함 app-image(폴더). MSI/DMG/DEB 설치본은 WiX 등
      # 추가 도구가 필요할 수 있어, CI 에서는 어디서나 도는 app-image 로 안정화.
      - name: Package desktop app-image
        shell: bash
        run: ./gradlew :app:createDistributable --console=plain --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: daynote-desktop-${{ matrix.os }}
          path: app/build/compose/binaries/main/app/**

  # 안드로이드 AAB(Play 업로드용). 서명 시크릿이 설정돼 있으면 서명, 없으면 미서명으로 빌드.
  android:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      # 저장소 Secrets 에 아래 4개를 넣으면 서명된 AAB 가 나온다:
      #   KEYSTORE_BASE64  = base64 로 인코딩한 .jks (예: base64 -w0 daynote-release.jks)
      #   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      - name: Prepare signing (if secrets set)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > daynote-release.jks
            {
              echo "storeFile=daynote-release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "서명 구성 완료."
          else
            echo "서명 시크릿 없음 — 미서명 AAB 로 빌드(설치 불가, 검증용)."
          fi
      - name: Build AAB
        shell: bash
        run: ./gradlew :app:bundleRelease --console=plain --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: daynote-android-aab
          path: app/build/outputs/bundle/release/*.aab
